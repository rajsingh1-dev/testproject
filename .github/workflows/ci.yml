name: Run SFS Tests on VPS

on:
  push:
    branches:
      - main

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-tests:
    name: Run SFS Pytest on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/ci_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/ci_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run SFS tests via Docker on VPS
        run: |
          ssh -i ~/.ssh/ci_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'

            echo "=== Starting SFS tests on VPS ==="
            cd /root/tir-automation

            # Clean previous results
            rm -rf allure-results && mkdir -p allure-results

            # Run SFS tests using Docker
            docker run --rm \
              -e ENV=prod \
              -v /root/tir-automation/env/prod.env:/app/env/prod.env:ro \
              -v /root/tir-automation/allure-results:/app/allure-results \
              registry.e2enetworks.net/rajsinghast03/tir-automation@sha256:c1c899eff96e0bf4647d45e93918bab8bdd6b212fb93640dd35608c6b01f6ca6 \
              -m sfs -v --alluredir=/app/allure-results

            echo "=== SFS tests completed ==="
            ls -la /root/tir-automation/allure-results/
          ENDSSH

      - name: Download test results from VPS
        if: always()
        run: |
          mkdir -p ./allure-results
          scp -i ~/.ssh/ci_key -o StrictHostKeyChecking=no -r \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/tir-automation/allure-results/ \
            ./allure-results/
          echo "=== Downloaded files ==="
          ls -la ./allure-results/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ci_key

      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq default-jre-headless > /dev/null
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar xz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML Report
        if: always()
        run: |
          allure generate ./allure-results --clean -o ./allure-report
          echo "=== Report generated ==="
          ls -la ./allure-report/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: ./allure-report

  deploy-report:
    name: Deploy Allure Report to GitHub Pages
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

