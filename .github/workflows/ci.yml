name: Run Smoke Tests on Server

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    name: Run Smoke Tests on Server
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/ci_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/ci_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Smoke tests via Docker on Server
        run: |
          ssh -i ~/.ssh/ci_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'

            echo "=== Starting Smoke tests on Server ==="
            cd /root/tir-automation

            # Clean previous results
            rm -rf allure-results && mkdir -p allure-results

            # Run Smoke tests using Docker
            docker run --rm \
              -e ENV=prod \
              -v /root/tir-automation/env/prod.env:/app/env/prod.env:ro \
              -v /root/tir-automation/allure-results:/app/allure-results \
              registry.e2enetworks.net/mycr03/tir_automation-v2@sha256:f1d1b2bf925dbcf7c568fe6c893a1c33dc18c0fda018c1cc40b4c4b248cb1855 \
              -m smoke -v --alluredir=/app/allure-results

            echo "=== Smoke tests completed ==="
            ls -la /root/tir-automation/allure-results/
          ENDSSH

      - name: Download test results from VPS
        if: always()
        run: |
          mkdir -p ./allure-results
          scp -i ~/.ssh/ci_key -o StrictHostKeyChecking=no -r \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/tir-automation/allure-results/ \
            ./allure-results/
          echo "=== Downloaded files ==="
          ls -la ./allure-results/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ci_key

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: ./allure-results/
          retention-days: 30

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## 🧪 SFS Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Marker**: \`sfs\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Allure Results**: Download from the **Artifacts** section below ⬇️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "./allure-results" ]; then
            RESULT_COUNT=$(find ./allure-results -name "*.json" | wc -l)
            echo "- **Result files found**: $RESULT_COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ No test results downloaded" >> $GITHUB_STEP_SUMMARY
          fi

